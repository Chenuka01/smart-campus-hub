# Server
server.port=8084
server.error.include-message=always
server.error.include-binding-errors=always

# Datasource (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/studenthub?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# SQL Initialisation
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:db/seed-data.sql
spring.sql.init.continue-on-error=true

# Cache (in-memory, no Redis)
spring.cache.type=simple

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=35MB

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:chenukamudannayake@gmail.com}
spring.mail.password=${MAIL_PASSWORD:nthm vodl svai rjtw}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.from=${MAIL_FROM:noreply@smartcampus.edu}

# JWT
app.jwt.secret=SmartCampusHub2026SecretKeyForJWTTokenGenerationAndValidation2026!
app.jwt.expiration=86400000

# OAuth2 (Google)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:22103626788-ko7np31jpesqq63i3qc3sbbaqjstecgq.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-client-secret}

# Rate Limiting (Disabled for local testing/stress testing)
app.rate-limit.enabled=false
app.rate-limit.max-requests-per-window=10000
app.rate-limit.auth-max-requests-per-window=1000
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Uploads directory
app.upload.dir=uploads

# CORS (Allow localhost/127.0.0.1 on any frontend port during local development)
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:[*],http://127.0.0.1:[*]}

# HTTPS/TLS Configuration (for production)
server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.ssl.key-store=${SERVER_SSL_KEYSTORE:}
server.ssl.key-store-password=${SERVER_SSL_KEYSTORE_PASSWORD:}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat
server.http2.enabled=true

# Security Headers
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# Rate Limiting (Disabled for multi-front-end development)
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:false}
app.rate-limit.window-size-seconds=60
app.rate-limit.max-requests-per-window=10000
app.rate-limit.auth-max-requests-per-window=5000

# Logging (comprehensive audit logging)
logging.level.root=WARN
logging.level.com.smartcampus=DEBUG
logging.level.com.smartcampus.security=DEBUG
logging.level.com.smartcampus.controller=INFO
logging.level.com.smartcampus.service=INFO
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.file.name=${LOG_FILE:logs/smartcampus.log}
logging.file.max-size=10MB
logging.file.max-history=30

# Audit Logging (separate file for compliance tracking)
logging.level.com.smartcampus.security.AuditLoggingAspect=INFO
