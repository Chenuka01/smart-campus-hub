name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend - Test and Package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smart/smart-campus-hub/smart-campus/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: smart/smart-campus-hub/smart-campus/backend/pom.xml

      - name: Run backend tests
        run: mvn --batch-mode test

      - name: Package backend
        run: mvn --batch-mode -DskipTests package

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-campus-backend
          path: smart/smart-campus-hub/smart-campus/backend/target/*.jar
          if-no-files-found: error

  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smart/smart-campus-hub/smart-campus/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: smart/smart-campus-hub/smart-campus/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend bundle
        run: npx vite build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-campus-frontend
          path: smart/smart-campus-hub/smart-campus/frontend/dist
          if-no-files-found: error
